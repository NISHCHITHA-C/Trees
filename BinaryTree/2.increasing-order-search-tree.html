<body>

    <script>
        class LeetCodeVisualizer {
            constructor() {
                this.problemNumber = 897;
                this.problemTitle = "Increasing Order Search Tree";
                
                this.state = {
                    theme: 'dark',
                    mode: 'intuition',
                    
                    // Execution mode
                    currentStep: 0,
                    isPlaying: false,
                    speed: 1,
                    steps: [],
                    
                    // Intuition mode
                    currentIntuitionStage: 0,
                    isIntuitionPlaying: false,
                    
                    // Common
                    inputValue: '[5,3,6,2,4,null,8,1,null,null,null,7,9]',
                    panelWidths: [30, 50, 20]
                };

                this.playInterval = null;
                this.code = `# Definition for a binary tree node.
class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val
        self.left = left
        self.right = right

class Solution:
    def increasingBST(self, root: TreeNode) -> TreeNode:
        """
        Rearrange BST to increasing order (right-skewed tree) using in-order traversal.
        
        Time Complexity: O(n) - visit each node once
        Space Complexity: O(h) - recursion stack, where h is tree height
        """
        # Dummy node to avoid edge case handling for the first node
        dummy = TreeNode(0)
        self.current = dummy
        
        def inorder(node: TreeNode) -> None:
            """In-order traversal: left -> root -> right"""
            if not node:
                return
            
            # Process left subtree
            inorder(node.left)
            
            # Process current node
            # Detach left child and link as right child of previous node
            node.left = None
            self.current.right = node
            self.current = node
            
            # Process right subtree
            inorder(node.right)
        
        inorder(root)
        return dummy.right`;

                this.intuitionStages = this.getIntuitionStages();
                this.init();
            }

            init() {
                this.runSimulation();
                this.render();
                this.attachEventListeners();
            }

            getIntuitionStages() {
                return [
                    {
                        title: "Understanding the Problem",
                        thought: "What does 'increasing order' mean for a tree? Let me look at the examples...",
                        content: `We need to transform a BST into a right-skewed tree where:
• All nodes have no left children
• Values appear in ascending order when reading top to bottom
• It's still technically a tree, just a degenerate one (like a linked list)

The key insight: BST's in-order traversal already gives us sorted values!`,
                        insight: "In-order traversal of a BST visits nodes in ascending order. If we can rearrange during traversal, we solve this!",
                        visualization: "example_tree"
                    },
                    {
                        title: "Exploring Approaches",
                        thought: "I could store values in an array and rebuild... but there's a smarter way",
                        content: `Approach 1: Two-pass solution
• Do in-order traversal, collect all values in a list
• Build new right-skewed tree from the list
• Time: O(n), Space: O(n) for the list

Approach 2: One-pass in-place rearrangement
• Perform in-order traversal
• As we visit each node, rewire it to be the right child of the previous node
• Time: O(n), Space: O(h) for recursion stack only

Why Approach 2 is better: No extra array needed, more elegant!`,
                        insight: "We can rearrange nodes during traversal instead of collecting and rebuilding",
                        visualization: "approach_comparison"
                    },
                    {
                        title: "The Key Technique: Dummy Node",
                        thought: "Wait! How do I handle the first node without special cases? Dummy node!",
                        content: `The Dummy Node Trick:
• Create a dummy node (value = 0) as a placeholder
• Keep a 'current' pointer starting at dummy
• As we visit nodes in order:
  1. Detach the node's left child (set to null)
  2. Make it the right child of 'current'
  3. Move 'current' to this node
• After traversal, return dummy.right (the actual root)

Why this works: The dummy node eliminates the edge case of "what's the parent of the first node?"`,
                        insight: "Dummy nodes are a classic technique to avoid special-casing the first element in list/tree operations",
                        visualization: "dummy_technique"
                    },
                    {
                        title: "In-Order Traversal Pattern",
                        thought: "In-order is perfect: left → root → right gives us sorted order",
                        content: `In-order traversal for BST:
1. Recursively process left subtree
2. Visit current node (this is when we rewire it!)
3. Recursively process right subtree

For our BST [5,3,6,2,4,null,8,1]:
In-order sequence: 1, 2, 3, 4, 5, 6, 7, 8, 9

This is exactly the order we want in our result!`,
                        insight: "The recursive structure naturally handles all the rewiring as we unwind the call stack",
                        visualization: "inorder_demo"
                    },
                    {
                        title: "Implementation Strategy",
                        thought: "Let me code this step by step: dummy, current pointer, in-order helper...",
                        content: `Code structure:
1. Initialize: dummy = TreeNode(0), current = dummy
2. Define recursive helper inorder(node):
   • Base case: if not node, return
   • Recurse left: inorder(node.left)
   • Process node:
     - node.left = None (detach left)
     - current.right = node (attach to chain)
     - current = node (move pointer)
   • Recurse right: inorder(node.right)
3. Call inorder(root)
4. Return dummy.right`,
                        insight: "The order of operations (left → process → right) is crucial for correct linking",
                        visualization: "code_structure"
                    },
                    {
                        title: "Complexity Analysis",
                        thought: "Let me verify this is optimal... visiting each node once...",
                        content: `Time Complexity: O(n)
• Visit each node exactly once during in-order traversal
• Each node operation (detaching, linking) is O(1)
• Total: n nodes × O(1) = O(n)

Space Complexity: O(h)
• Recursion call stack depth = tree height h
• Best case (balanced tree): O(log n)
• Worst case (skewed tree): O(n)
• No extra data structures needed!

This is optimal - we can't do better than O(n) time since we must visit all nodes.`,
                        insight: "The in-place approach saves O(n) space compared to the two-pass array solution",
                        visualization: "complexity"
                    },
                    {
                        title: "Edge Cases & Robustness",
                        thought: "What could break this? Empty tree? Single node? Already right-skewed?",
                        content: `Edge cases handled:
✓ Empty tree (null root): inorder returns immediately, dummy.right = null
✓ Single node: becomes dummy → node, return node
✓ Already right-skewed: still works correctly, just rewires the same structure
✓ All left-skewed: transforms perfectly to right-skewed
✓ Perfectly balanced: works as expected

The dummy node pattern makes all these cases trivial!`,
                        insight: "Good algorithm design handles edge cases naturally without special-case code",
                        visualization: "edge_cases"
                    },
                    {
                        title: "The Elegant Solution",
                        thought: "Beautiful! In-order traversal + dummy node = clean solution",
                        content: `Why this solution is interview-ready:
• Optimal time and space complexity
• In-place modification (no extra arrays)
• Clean recursive structure
• No special cases or conditionals
• Demonstrates understanding of:
  - BST properties (in-order = sorted)
  - Tree traversal patterns
  - Pointer manipulation
  - Dummy node technique

This is exactly how a senior engineer would approach it!`,
                        insight: "The best solutions combine fundamental techniques (traversal + dummy node) to elegantly solve complex problems",
                        visualization: "final_demo"
                    }
                ];
            }

            // Tree Parsing
            parseTreeFromArray(arr) {
                if (typeof arr === 'string') {
                    arr = JSON.parse(arr);
                }
                if (!arr || arr.length === 0) return null;

                let nodeId = 0;
                const root = { val: arr[0], left: null, right: null, id: nodeId++ };
                const queue = [root];
                let i = 1;

                while (queue.length > 0 && i < arr.length) {
                    const node = queue.shift();
                    
                    if (i < arr.length && arr[i] !== null) {
                        node.left = { val: arr[i], left: null, right: null, id: nodeId++ };
                        queue.push(node.left);
                    }
                    i++;
                    
                    if (i < arr.length && arr[i] !== null) {
                        node.right = { val: arr[i], left: null, right: null, id: nodeId++ };
                        queue.push(node.right);
                    }
                    i++;
                }

                return root;
            }

            cloneTree(node) {
                if (!node) return null;
                return {
                    val: node.val,
                    id: node.id,
                    left: this.cloneTree(node.left),
                    right: this.cloneTree(node.right)
                };
            }

            // Simulation
            runSimulation() {
                const root = this.parseTreeFromArray(this.state.inputValue);
                this.state.steps = this.simulateInorder(root);
            }

            simulateInorder(root) {
                const steps = [];
                let stepNum = 0;
                const result = [];
                let currentId = null;
                let dummyId = -1;

                // Track the dummy and current pointers
                let currentPointer = dummyId;

                steps.push({
                    line: 18,
                    description: 'Initialize dummy node and current pointer',
                    vars: { dummy: 0, current: 'dummy' },
                    tree: this.cloneTree(root),
                    resultTree: null,
                    currentNodeId: null,
                    currentPointer: dummyId,
                    stepNum: stepNum++
                });

                const inorder = (node, depth = 0) => {
                    if (!node) {
                        steps.push({
                            line: 23,
                            description: 'Base case: null node, return immediately',
                            vars: { node: 'null', depth },
                            tree: this.cloneTree(root),
                            resultTree: this.cloneTree(root),
                            currentNodeId: null,
                            currentPointer,
                            stepNum: stepNum++
                        });
                        return;
                    }

                    steps.push({
                        line: 26,
                        description: `Recursively process left subtree of node ${node.val}`,
                        vars: { node_val: node.val, depth },
                        tree: this.cloneTree(root),
                        resultTree: this.cloneTree(root),
                        currentNodeId: node.id,
                        currentPointer,
                        stepNum: stepNum++
                    });

                    inorder(node.left, depth + 1);

                    // Process current node
                    result.push(node.val);
                    steps.push({
                        line: 30,
                        description: `Detach left child of node ${node.val}`,
                        vars: { node_val: node.val, 'node.left': 'None', depth },
                        tree: this.cloneTree(root),
                        resultTree: this.cloneTree(root),
                        currentNodeId: node.id,
                        currentPointer,
                        stepNum: stepNum++
                    });

                    steps.push({
                        line: 31,
                        description: `Link node ${node.val} as right child of current`,
                        vars: { node_val: node.val, current: currentPointer === dummyId ? 'dummy' : currentPointer, depth },
                        tree: this.cloneTree(root),
                        resultTree: this.cloneTree(root),
                        currentNodeId: node.id,
                        currentPointer,
                        stepNum: stepNum++
                    });

                    currentPointer = node.id;
                    steps.push({
                        line: 32,
                        description: `Move current pointer to node ${node.val}`,
                        vars: { current: node.val, depth, result: [...result] },
                        tree: this.cloneTree(root),
                        resultTree: this.cloneTree(root),
                        currentNodeId: node.id,
                        currentPointer,
                        stepNum: stepNum++
                    });

                    steps.push({
                        line: 35,
                        description: `Recursively process right subtree of node ${node.val}`,
                        vars: { node_val: node.val, depth },
                        tree: this.cloneTree(root),
                        resultTree: this.cloneTree(root),
                        currentNodeId: node.id,
                        currentPointer,
                        stepNum: stepNum++
                    });

                    inorder(node.right, depth + 1);
                };

                inorder(root);

                steps.push({
                    line: 38,
                    description: 'Return dummy.right as the new root',
                    vars: { result: result, final_root: root ? root.val : 'null' },
                    tree: this.cloneTree(root),
                    resultTree: this.cloneTree(root),
                    currentNodeId: null,
                    currentPointer,
                    stepNum: stepNum++
                });

                return steps;
            }

            // Render Methods
            render() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="header">
                        <div class="header-top">

                            <button class="theme-toggle" onclick="app.toggleTheme()">
                                ${this.state.theme === 'dark' ? '☀️ Light' : '🌙 Dark'} Mode
                            </button>
                        </div>
                        
                        <div class="mode-toggle">
                            <button class="mode-btn ${this.state.mode === 'intuition' ? 'active' : ''}" 
                                    onclick="app.toggleMode('intuition')">
                                💡 Intuition & Thought Process
                            </button>
                            <button class="mode-btn ${this.state.mode === 'execution' ? 'active' : ''}" 
                                    onclick="app.toggleMode('execution')">
                                ▶️ Step-by-Step Execution
                            </button>
                        </div>
                        
                        ${this.state.mode === 'execution' ? this.renderInputSection() : ''}
                    </div>
                    
                    <div class="main-content">

            highlightPythonLine(line) {
                // Return early for empty lines
                if (!line.trim()) {
                    return '&nbsp;';
                }

                // Escape HTML first
                const div = document.createElement('div');
                div.textContent = line;
                let escaped = div.innerHTML;

                // Check if line is already highlighted (to avoid double-processing)
                if (escaped.includes('<span')) {
                    return escaped;
                }

                // Comments (must be first to avoid highlighting within comments)
                // Use a marker to protect comments from further processing
                escaped = escaped.replace(/(#.*$)/g, '___COMMENT_START___$1___COMMENT_END___');

                // Strings (handling escaped quotes)
                // Protect strings from further processing
                escaped = escaped.replace(/(&quot;)((?:(?!&quot;).)*?)(&quot;)/g, '___STR_START___$1$2$3___STR_END___');
                escaped = escaped.replace(/(&#39;)((?:(?!&#39;).)*?)(&#39;)/g, '___STR_START___$1$2$3___STR_END___');
                
                // Keywords
                const keywords = ['class', 'def', 'return', 'if', 'else', 'elif', 'for', 'while', 'in', 'not', 'and', 'or', 'None', 'True', 'False', 'self'];
                keywords.forEach(kw => {
                    const regex = new RegExp(`\\b${kw}\\b`, 'g');
                    escaped = escaped.replace(regex, `<span class="kw">${kw}</span>`);
                });

                // Types
                const types = ['TreeNode', 'Optional', 'List', 'int', 'str'];
                types.forEach(type => {
                    const regex = new RegExp(`\\b${type}\\b`, 'g');
                    escaped = escaped.replace(regex, `<span class="type">${type}</span>`);
                });

                // Function names (after def or standalone calls)
                escaped = escaped.replace(/(<span class="kw">def<\/span>)\s+(\w+)/g, '$1 <span class="fn">$2</span>');
                escaped = escaped.replace(/\b(inorder|increasingBST)\s*\(/g, '<span class="fn">$1</span>(');

                // Numbers
                escaped = escaped.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');

                // Restore protected strings
                escaped = escaped.replace(/___STR_START___(.*?)___STR_END___/g, '<span class="str">$1</span>');

                // Restore protected comments
                escaped = escaped.replace(/___COMMENT_START___(.*?)___COMMENT_END___/g, '<span class="comment">$1</span>');

                return escaped;
            }

            renderTree(node, currentNodeId) {
                if (!node) return '<p style="color: var(--text-secondary);">Empty tree</p>';

                // Calculate positions using BFS
                const positions = this.calculateTreePositions(node);
                const width = 800;
                const height = 400;

                const edges = positions.edges.map((edge, i) => {
                    const isHighlight = edge.from.id === currentNodeId || edge.to.id === currentNodeId;
                    return `
                        <line class="edge-line"
                              x1="${edge.from.x}" y1="${edge.from.y}"
                              x2="${edge.to.x}" y2="${edge.to.y}"
                              stroke="${isHighlight ? '#3b82f6' : '#6b7280'}"
                              stroke-width="2" />
                    `;
                }).join('');

                const nodes = positions.nodes.map((n, i) => {
                    const isCurrent = n.id === currentNodeId;
                    return `
                        <g>
                            <circle class="node-circle"
                                    cx="${n.x}" cy="${n.y}" r="24"
                                    fill="${isCurrent ? '#3b82f6' : '#374151'}"
                                    stroke="#60a5fa"
                                    stroke-width="${isCurrent ? 3 : 1}" />
                            <text class="node-text"
                                  x="${n.x}" y="${n.y}"
                                  text-anchor="middle"
                                  dominant-baseline="middle"
                                  font-size="14">
                                ${n.val}
                            </text>
                        </g>
                    `;
                }).join('');

                return `
                    <svg viewBox="0 0 ${width} ${height}" style="width: 100%; height: 100%; max-height: 500px;">
                        ${edges}
                        ${nodes}
                    </svg>
                `;
            }

            calculateTreePositions(root) {
                const nodes = [];
                const edges = [];
                const levelWidth = 100;
                const levelHeight = 80;

                const traverse = (node, x, y, level, xOffset) => {
                    if (!node) return;

                    nodes.push({ ...node, x, y, level });

                    const nextOffset = xOffset / 2;
                    if (node.left) {
                        const leftX = x - nextOffset;
                        const leftY = y + levelHeight;
                        edges.push({ from: { x, y, id: node.id }, to: { x: leftX, y: leftY, id: node.left.id } });
                        traverse(node.left, leftX, leftY, level + 1, nextOffset);
                    }

                    if (node.right) {
                        const rightX = x + nextOffset;
                        const rightY = y + levelHeight;
                        edges.push({ from: { x, y, id: node.id }, to: { x: rightX, y: rightY, id: node.right.id } });
                        traverse(node.right, rightX, rightY, level + 1, nextOffset);
                    }
                };

                traverse(root, 400, 50, 0, 150);

                return { nodes, edges };
            }

                                ✓ <strong>No edge case handling:</strong> Dummy node handles everything<br>
                                ✓ <strong>Demonstrates mastery of:</strong>
                                <ul style="margin-left: 30px; margin-top: 8px;">
                                    <li>BST properties (in-order = sorted)</li>
                                    <li>Tree traversal patterns</li>
                                    <li>Pointer manipulation</li>
                                    <li>Dummy node technique</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Control Methods
            toggleTheme() {
                this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark';
                this.render();
            }

            toggleMode(mode) {
                this.pause();
                this.pauseIntuition();
                this.state.mode = mode;
                if (mode === 'intuition') {
                    this.state.currentIntuitionStage = 0;
                } else {
                    this.state.currentStep = 0;
                }
                this.render();
            }

            updateInput(event) {
                this.state.inputValue = event.target.value;
            }

            rerun() {
                this.pause();
                this.state.currentStep = 0;
                this.runSimulation();
                this.render();
            }

            reset() {
                this.pause();
                this.state.currentStep = 0;
                this.render();
            }

            stepForward() {
                if (this.state.currentStep < this.state.steps.length - 1) {
                    this.state.currentStep++;
                    this.render();
                }
            }

            stepBack() {
                if (this.state.currentStep > 0) {
                    this.state.currentStep--;
                    this.render();
                }
            }

            play() {
                if (this.state.isPlaying) {
                    this.pause();
                } else {
                    this.state.isPlaying = true;
                    this.playInterval = setInterval(() => {
                        if (this.state.currentStep < this.state.steps.length - 1) {
                            this.state.currentStep++;
                            this.render();
                        } else {
                            this.pause();
                        }
                    }, 1000 / this.state.speed);
                    this.render();
                }
            }

            pause() {
                this.state.isPlaying = false;
                if (this.playInterval) {
                    clearInterval(this.playInterval);
                    this.playInterval = null;
                }
            }

            setSpeed(event) {
                this.state.speed = parseFloat(event.target.value);
                if (this.state.isPlaying) {
                    this.pause();
                    this.play();
                }
            }

            nextIntuitionStage() {
                if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
                    this.state.currentIntuitionStage++;
                    this.render();
                }
            }

            prevIntuitionStage() {
                if (this.state.currentIntuitionStage > 0) {
                    this.state.currentIntuitionStage--;
                    this.render();
                }
            }

            playIntuition() {
                if (this.state.isIntuitionPlaying) {
                    this.pauseIntuition();
                } else {
                    this.state.isIntuitionPlaying = true;
                    this.playInterval = setInterval(() => {
                        if (this.state.currentIntuitionStage < this.intuitionStages.length - 1) {
                            this.state.currentIntuitionStage++;
                            this.render();
                        } else {
                            this.pauseIntuition();
                        }
                    }, 4000); // 4 seconds per stage
                    this.render();
                }
            }

            pauseIntuition() {
                this.state.isIntuitionPlaying = false;
                if (this.playInterval) {
                    clearInterval(this.playInterval);
                    this.playInterval = null;
                }
            }

            attachEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.play();
                        } else {
                            this.playIntuition();
                        }
                    } else if (e.code === 'ArrowRight') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.stepForward();
                        } else {
                            this.nextIntuitionStage();
                        }
                    } else if (e.code === 'ArrowLeft') {
                        e.preventDefault();
                        if (this.state.mode === 'execution') {
                            this.stepBack();
                        } else {
                            this.prevIntuitionStage();
                        }
                    }
                });
            }
        }

        // Initialize app
        const app = new LeetCodeVisualizer();
    </script>
